    </main>

    <audio id="audioPlayer">
    
    <script>
      function playAudio(e, src) {
          const audio_player = document.getElementById("audioPlayer");
          const new_src = "audios/" + src;

          document.querySelectorAll('.playing').forEach(e => {
              e.classList.remove("playing");
          });

          // Already playing?
          if (audio_player.getAttribute("src") === new_src && !audio_player.paused) {
              audio_player.pause();
              return;
          }
          
          audio_player.setAttribute("src", "audios/" + src);
          audio_player.load();
          audio_player.play();

          e.classList.add("playing");
          audio_player.onpause = () => { e.classList.remove("playing") };
      }
    </script>
